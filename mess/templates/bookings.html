{% extends 'base.html' %}

{% block content %}
<h2>📋 My Bookings</h2>

{% if bookings %}
    {% for b in bookings %}
    <div class="card">
        <h3>{{ b.meal.name }}</h3>
        <p>Price: ₹{{ b.meal.price }}</p>
    </div>
    {% endfor %}
{% else %}
    <p class="empty">No bookings yet 😔</p>
{% endif %}

{% endblock %}
