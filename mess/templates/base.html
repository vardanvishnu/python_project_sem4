<!DOCTYPE html>
<html>
<head>
    <title>Mess Booking</title>
    <style>

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;

        /* Food background image */
        background: 
            linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url('https://images.unsplash.com/photo-1504674900247-0877df9cc836');

        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
    }
        

        nav {
            background: rgba(0,0,0,0.7);
            padding: 15px;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            margin-right: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav span {
            color: #f1c40f;
            font-weight: bold;
        }

        .container {
            padding: 30px;
        }

        h2 {
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.95);
            padding: 20px;
            margin: 15px 0;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.02);
        }

        .btn {
            background: #27ae60;
            color: white;
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
        }

        .btn:hover {
            background: #219150;
        }

        .empty {
            color: white;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<nav>
    <div>
        <a href="/">Home</a>
        <a href="/my-booking/">My Booking</a>
    </div>

    <div>
        {% if user.is_authenticated %}
            <span>👋 {{ user.username }}</span>
        {% else %}
            <a href="/login/">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
